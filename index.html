<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Nosso Espaço - Mural</title>
    <!-- Google Fonts: Inter & JetBrains Mono -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://cdn-uicons.flaticon.com/2.1.0/uicons-brands/css/uicons-brands.css" rel="stylesheet"/>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-container": "#8a2be2",
                    "error": "#ffb4ab",
                    "surface": "#1c1c1f",
                    "surface-variant": "#353437",
                    "on-background": "#f0f0f0",
                    "on-surface": "#f0f0f0",
                    "primary": "#ff00ff",
                    "primary-container": "#ff00ff",
                    "secondary-container": "#ff1493",
                    "background": "#0f0f11",
            },
            "boxShadow": {
                'brutal': '6px 6px 0px #000000',
                'brutal-active': '2px 2px 0px #000000',
                'brutal-hover': '8px 8px 0px #000000',
            }
          }
        }
      }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f0f11;
            color: #f0f0f0;
        }

        .masonry-grid {
            column-count: 1;
            column-gap: 16px;
        }
        @media (min-width: 768px) {
            .masonry-grid { column-count: 2; }
        }
        @media (min-width: 1024px) {
            .masonry-grid { column-count: 3; column-gap: 24px; }
        }

        .post-it {
            break-inside: avoid;
            margin-bottom: 16px;
            background-color: #1c1c1f;
            border: 2px solid #000;
            box-shadow: 6px 6px 0px #000000;
            position: relative;
            transition: all 0.2s ease;
            cursor: pointer;
            overflow: hidden;
        }
        
        .post-it .accordion-content {
            display: none;
        }

        .post-it.expanded .accordion-content {
            display: block;
        }

        @media (min-width: 1024px) {
            .post-it {
                margin-bottom: 24px;
            }
        }

        .post-it:hover {
            transform: translate(-2px, -2px);
            box-shadow: 8px 8px 0px #000000;
        }
        
        .post-it:active {
            transform: translate(4px, 4px);
            box-shadow: 2px 2px 0px #000000;
        }

        /* Tape Effect */
        .post-it::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%) rotate(-3deg);
            width: 40px;
            height: 12px;
            border: 1px solid #000;
            z-index: 1;
        }

        .tape-magenta::before { background-color: rgba(255, 0, 255, 0.85); }
        .tape-pink::before { background-color: rgba(255, 20, 147, 0.85); transform: translateX(-50%) rotate(2deg); }
        .tape-purple::before { background-color: rgba(138, 43, 226, 0.85); transform: translateX(-50%) rotate(-2deg); }
        .tape-chumbo::before { background-color: rgba(79, 79, 79, 0.85); transform: translateX(-50%) rotate(2deg); }

        /* Folded Corner */
        .post-it-fold {
            position: relative;
        }
        .post-it-fold::after {
            content: '';
            position: absolute;
            bottom: -2px;
            right: -2px;
            border-width: 20px 20px 0 0;
            border-style: solid;
            border-color: #333 #0f0f11 #0f0f11 #333;
            border-left-color: transparent;
            border-bottom-color: transparent;
            box-shadow: -2px -2px 0px rgba(0,0,0,0.5);
        }

        .glass-modal {
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        /* Toggle Button Styles */
        .toggle-btn {
            display: flex; align-items: center; justify-content: center; flex: 1; padding: 0.75rem 0; border: 2px solid #000; background-color: #353437; color: #f0f0f0; text-align: center; cursor: pointer; transition: all 0.2s; font-weight: bold; border-radius: 8px;
        }
        .toggle-btn.active {
            background-color: #ff00ff; color: #0f0f11; box-shadow: 4px 4px 0px #000000; transform: translate(-2px, -2px); border-radius: 8px;
        }

        /* Icon Grid Styles */
        .icon-btn {
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0.5rem; border: 2px solid #000; background-color: #353437; color: #f0f0f0; cursor: pointer; transition: all 0.2s; aspect-ratio: 1; border-radius: 8px;
        }
        .icon-btn.active {
            background-color: #ff1493; color: #0f0f11; box-shadow: 4px 4px 0px #000000; transform: translate(-2px, -2px); border-radius: 8px;
        }
    </style>
</head>
<body class="min-h-screen overflow-x-hidden bg-[#0f0f11]">

<script>
    // --- UI Logic (Global Scope) ---
    window.toggleModal = function() {
        const modal = document.getElementById('create-modal');
        modal.classList.toggle('hidden');
    };

    window.selectToggle = function(element) {
        const group = element.dataset.group;
        const value = element.dataset.value;
        
        document.querySelectorAll(`[data-group="${group}"]`).forEach(el => {
            el.classList.remove('active');
            if (group === 'tapeColor') {
                el.classList.remove('border-white');
                el.classList.add('border-transparent');
            }
        });
        
        element.classList.add('active');
        if (group === 'tapeColor') {
            element.classList.add('border-white');
            element.classList.remove('border-transparent');
        }
        
        document.getElementById(group).value = value;
        
        if (group === 'activity') {
            const extraInput = document.getElementById('extra-activity');
            if (value === '🎮 Jogando' || value === '➕ Outro') {
                extraInput.classList.remove('hidden');
                extraInput.placeholder = value === '🎮 Jogando' ? 'Qual jogo?' : 'Detalhes...';
                setTimeout(() => extraInput.focus(), 50);
            } else {
                extraInput.classList.add('hidden');
                extraInput.value = '';
            }
        }
    };

    window.selectLocation = function(element) {
        window.selectToggle(element);
        const value = element.dataset.value;
        const outFields = document.getElementById('out-fields');
        
        if (value === 'out') {
            outFields.classList.remove('hidden');
            outFields.classList.add('flex');
        } else {
            outFields.classList.add('hidden');
            outFields.classList.remove('flex');
        }
    };
</script>

<!-- Firebase v10 Logic -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, query, orderBy, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCGee-Amtjd4mJN2vwHnrStJyd3-f-3zkw",
        authDomain: "love-dce65.firebaseapp.com",
        projectId: "love-dce65",
        storageBucket: "love-dce65.firebasestorage.app",
        messagingSenderId: "582479938503",
        appId: "1:582479938503:web:e0e104448e511b17620fe2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const collectionRef = collection(db, "registros_tempo");

    // Save Functionality
    document.getElementById('btnSave').addEventListener('click', async () => {
        const btnSave = document.getElementById('btnSave');
        btnSave.disabled = true;
        btnSave.textContent = "Salvando...";

        const user = document.getElementById('user').value;
        const emotion = document.getElementById('emotion').value;
        let activity = document.getElementById('activity').value;
        const extraActivity = document.getElementById('extra-activity').value;
        const locationType = document.getElementById('location').value;
        const tapeColor = document.getElementById('tapeColor').value;
        const notes = document.getElementById('notaText').value;
        
        if ((activity === '🎮 Jogando' || activity === '➕ Outro') && extraActivity.trim() !== '') {
            activity += `: ${extraActivity.trim()}`;
        }

        const now = new Date();
        const docData = {
            user,
            emotion,
            activity,
            locationType,
            tapeColor,
            notes,
            destino: locationType === 'out' ? document.getElementById('destino').value : null,
            motivo: locationType === 'out' ? document.getElementById('motivo').value : null,
            volta: locationType === 'out' ? document.getElementById('volta').value : null,
            timeStr: now.toTimeString().substring(0,5),
            dateStr: now.toISOString().substring(0,10),
            timestamp: serverTimestamp()
        };

        try {
            await addDoc(collectionRef, docData);
            window.toggleModal();
            document.getElementById('notaForm').reset();
            document.getElementById('extra-activity').classList.add('hidden');
            if (locationType === 'out') {
                document.querySelector('.toggle-btn[data-value="home"]').click();
            }
        } catch (e) {
            alert("Erro ao salvar: " + e.message);
        } finally {
            btnSave.disabled = false;
            btnSave.textContent = "Pregar no Mural";
        }
    });

    // Vault Logic (Hash routing)
    const vaultSection = document.getElementById('bau');
    window.addEventListener('hashchange', checkHash);
    
    function checkHash() {
        if (window.location.hash === '#bau') {
            vaultSection.classList.remove('hidden');
        } else {
            vaultSection.classList.add('hidden');
        }
    }
    checkHash(); // Check on load

    // Export Functionality
    const q = query(collectionRef, orderBy("timestamp", "desc"));
    document.getElementById('btnExport').addEventListener('click', async () => {
        const snap = await getDocs(q);
        let txt = "COFRE DE REGISTROS - POST ITS\n==============================\n\n";
        snap.forEach(d => {
            const note = d.data();
            txt += `Data/Hora: ${note.dateStr} ${note.timeStr}\n`;
            txt += `Usuário: ${note.user} | Emoção: ${note.emotion} | Tema: ${note.tapeColor}\n`;
            txt += `Atividade: ${note.activity}\n`;
            txt += `Localização: ${note.locationType === 'home' ? 'EM CASA' : 'VOU SAIR'}\n`;
            if (note.locationType === 'out') {
                txt += `   Destino: ${note.destino} | Motivo: ${note.motivo} | Volta: ${note.volta}\n`;
            }
            if (note.notes) {
                txt += `Notas:\n${note.notes}\n`;
            }
            txt += `------------------------------\n`;
        });
        
        const blob = new Blob([txt], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `registros_tempo_${new Date().toISOString().substring(0,10)}.txt`;
        a.click();
        URL.revokeObjectURL(url);
    });

    // Clear Mural Functionality
    document.getElementById('btnClear').addEventListener('click', async () => {
        if (confirm("TEM CERTEZA? Isso vai apagar todos os post-its do mural atual.")) {
            if (confirm("Última chance! Confirma a exclusão de tudo?")) {
                const btnClear = document.getElementById('btnClear');
                btnClear.textContent = "Apagando...";
                btnClear.disabled = true;

                const snap = await getDocs(collectionRef);
                const promises = [];
                snap.forEach((d) => {
                    promises.push(deleteDoc(doc(db, "registros_tempo", d.id)));
                });

                await Promise.all(promises);
                
                btnClear.textContent = "Limpar Mural";
                btnClear.disabled = false;
                alert("Mural limpo com sucesso!");
            }
        }
    });

    // Realtime Feed Rendering
    const feed = document.getElementById('feed');
    onSnapshot(q, (snapshot) => {
        feed.innerHTML = '';
        snapshot.forEach((docSnap) => {
            const note = docSnap.data();
            const article = document.createElement('article');
            article.className = `post-it ${note.tapeColor} post-it-fold p-5`;
            article.onclick = function() { this.classList.toggle('expanded'); };

            let locationIcon = note.locationType === 'home' ? '🏠' : '🚶‍♂️';
            
            let extraContent = '';
            if (note.locationType === 'out') {
                extraContent = `
                    <div class="mt-4 p-3 border-2 border-dashed border-white/20 bg-black/20 text-sm font-mono text-white">
                        <p><strong>📍 P/ Onde:</strong> ${note.destino || '---'}</p>
                        <p><strong>🎯 Motivo:</strong> ${note.motivo || '---'}</p>
                        <p><strong>⏳ Volta:</strong> ${note.volta || '---'}</p>
                    </div>
                `;
            }

            let textContent = note.notes ? `<p class="mt-4 font-mono text-[#f0f0f0] whitespace-pre-wrap">${note.notes}</p>` : '';

            article.innerHTML = `
                <header class="flex justify-between items-start">
                    <div class="flex items-center gap-3">
                        <span class="w-10 h-10 flex items-center justify-center bg-surface-variant border-2 border-black text-[#f0f0f0] font-bold text-lg">${note.user}</span>
                        <div class="flex flex-col">
                            <span class="font-mono text-xs text-[#888888]">${note.timeStr || 'Agora'}</span>
                            <div class="flex gap-2 text-sm mt-1 font-mono">
                                <span>${note.emotion}</span>
                                <span>|</span>
                                <span>${locationIcon}</span>
                                ${note.activity !== '🚫 Nenhum' ? `<span>| ${note.activity}</span>` : ''}
                            </div>
                        </div>
                    </div>
                </header>
                <div class="accordion-content">
                    ${extraContent}
                    ${textContent}
                </div>
            `;
            feed.appendChild(article);
        });
    });
</script>
</body>
</html>
